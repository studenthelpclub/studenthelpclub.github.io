<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator - Student Help Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f8f9fa; color: #333; }
        .header { background: #fff; padding: 15px; text-align: center; border-bottom: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #0d6efd; }
        .header h1 { font-size: 20px; color: #1d3557; margin-top: 5px; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); text-align: center; }
        input[type="date"] { width: 100%; padding: 12px; margin: 10px 0 20px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        .main-btn { width: 100%; padding: 15px; background: #0d6efd; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #ageResult { margin-top: 25px; padding: 20px; background: #eef2f7; border-radius: 12px; display: none; border: 1px solid #0d6efd; }
        .footer { text-align: center; padding: 30px; margin-top: 40px; background: #fff; border-top: 1px solid #eee; }
        .social-links a { font-size: 28px; margin: 0 15px; text-decoration: none; }
    </style>
</head>
<body>
    <header class="header">
        <img src="shc-logo.jpg" alt="SHC Logo" class="logo">
        <h1>STUDENT HELP CLUB</h1>
    </header>
    <div class="container">
        <h2>Age Calculator</h2>
        <p style="margin-bottom: 20px; color: #666;">Calculate exact age for exam forms.</p>
        <div style="text-align: left;">
            <label>Date of Birth:</label>
            <input type="date" id="dob">
            <label>Age at the Date of:</label>
            <input type="date" id="today">
        </div>
        <button onclick="calculateAge()" class="main-btn">Calculate Age</button>
        <div id="ageResult">
            <h3 id="resultText" style="color: #28a745;"></h3>
        </div>
    </div>
    <footer class="footer">
        <div class="social-links">
            <a href="#" style="color:#ff0000"><i class="fab fa-youtube"></i></a>
            <a href="#" style="color:#0088cc"><i class="fab fa-telegram-plane"></i></a>
        </div>
        <p style="margin-top: 15px; font-size: 12px;">© 2026 Student Help Club</p>
    </footer>
    <script>
        document.getElementById('today').valueAsDate = new Date();
        function calculateAge() {
            const dob = new Date(document.getElementById('dob').value);
            const today = new Date(document.getElementById('today').value);
            if(!dob || dob > today) return alert("Please enter valid dates");
            let years = today.getFullYear() - dob.getFullYear();
            let months = today.getMonth() - dob.getMonth();
            let days = today.getDate() - dob.getDate();
            if (days < 0) { months--; days += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
            if (months < 0) { years--; months += 12; }
            document.getElementById('resultText').innerText = `${years} Years, ${months} Months, ${days} Days`;
            document.getElementById('ageResult').style.display = "block";
        }
    </script>
</body>
</html>
