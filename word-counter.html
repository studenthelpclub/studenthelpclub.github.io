<div class="container">
    <h2><i class="fas fa-calculator"></i> Smart Word Counter</h2>
    <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Analyze your text and change case instantly.</p>
    
    <textarea id="textInput" placeholder="Paste or type your text here..." 
        style="width: 100%; height: 220px; padding: 18px; border: 2px solid #dee2e6; border-radius: 15px; font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);"></textarea>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
        <div class="stats-box" style="background: #fff; padding: 15px; border-radius: 12px; border: 2px solid #f0f2f5; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
            <span style="display: block; font-size: 28px; font-weight: 800; color: #0d6efd;" id="wordCount">0</span>
            <span style="font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px;">Words</span>
        </div>
        <div class="stats-box" style="background: #fff; padding: 15px; border-radius: 12px; border: 2px solid #f0f2f5; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
            <span style="display: block; font-size: 28px; font-weight: 800; color: #0d6efd;" id="charCount">0</span>
            <span style="font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px;">Characters</span>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px;">
        <button onclick="changeCase('upper')" class="select-btn" style="background: #1d3557; color: white; padding: 12px; border-radius: 10px; font-weight: 600;">UPPERCASE</button>
        <button onclick="changeCase('lower')" class="select-btn" style="background: #1d3557; color: white; padding: 12px; border-radius: 10px; font-weight: 600;">lowercase</button>
        <button onclick="changeCase('sentence')" class="select-btn" style="background: #1d3557; color: white; padding: 12px; border-radius: 10px; font-weight: 600;">Sentence case</button>
    </div>

    <div style="margin-top: 15px; display: flex; gap: 10px;">
        <button onclick="copyText()" class="download-btn" id="copyBtn" style="flex: 2; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <i class="fas fa-copy"></i> Copy Text
        </button>
        <button onclick="clearText()" class="reset-btn" style="flex: 1; margin-top: 15px;">
            <i class="fas fa-trash-alt"></i> Clear
        </button>
    </div>
</div>
