<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF - Student Help Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3110600191216941" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WKEZF1XEMF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WKEZF1XEMF');
    </script>
    <link rel="icon" type="image/jpg" href="shc-logo.jpg">

    <style>
        /* DESIGN RESET AS PER YOUR IMAGE_1 */
        .upload-container {
            border: 2px dashed #198754;
            background: #fff;
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        /* Image_1 wala Icon Style */
        .upload-container i {
            font-size: 50px;
            color: #198754;
            margin-bottom: 10px;
        }

        /* Image_1 wala "Add Images" Green Button */
        .select-btn-ui {
            background: #198754;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            text-align: center;
        }

        /* Hidden Input but full cover for easy selection */
        #imageInput {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        #previewContainer iframe {
            width: 100%;
            height: 500px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 15px;
            display: block;
        }

        @media (max-width: 600px) {
            #previewContainer iframe { height: 380px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="shc-logo.jpg" alt="SHC Logo" class="logo">
        <h1>STUDENT HELP CLUB</h1>
    </header>

    <nav class="main-nav">
        <ul>
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="img-to-pdf.html" class="active"><i class="fas fa-file-pdf"></i> Image to PDF</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 style="text-align:center;">Image to PDF Converter</h2>
        <p style="text-align:center; color: #666; font-size: 14px;">Convert JPG, PNG, WEBP images into a single high-quality PDF</p>
        
        <div class="upload-container">
            <input type="file" id="imageInput" accept="image/*" multiple>
            <i class="fas fa-images"></i>
            <p id="statusText" style="margin-top: 5px; font-weight: 500;">Select or Drag Images here</p>
            <div class="select-btn-ui">Add Images</div>
        </div>

        <div id="imageList" style="margin-top: 20px;"></div>

        <div id="pdfSettings" style="display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <label style="font-weight: 600;">Orientation:</label>
                <select id="orientation" style="padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                    <option value="p">Portrait</option>
                    <option value="l">Landscape</option>
                </select>
            </div>
            <button id="convertBtn" class="main-btn" style="background: #198754; width:100%; color:white; border:none; padding:16px; border-radius:10px; font-weight:bold; font-size:16px;">Create PDF Now</button>
            <button id="resetBtn" style="width:100%; background:none; border:none; color:#888; margin-top:10px; cursor:pointer;">Clear All</button>
        </div>

        <div id="resultArea" style="display: none; margin-top: 30px;">
            <h3 style="color: #198754; text-align: center;"><i class="fas fa-check-circle"></i> PDF Ready!</h3>
            <div id="previewContainer"></div>
            <button id="downloadBtn" class="download-btn" style="background: #0d6efd; width:100%; color:white; border:none; padding:16px; border-radius:10px; font-weight:bold; margin-top:20px;">Download My PDF</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="img-to-pdf.js"></script>
</body>
</html>
